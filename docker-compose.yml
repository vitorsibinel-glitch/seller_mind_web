services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_sellermind
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_sellermind:/data/db

  redis:
    image: redis:latest
    container_name: redis_sellermind
    ports:
      - "6379:6379"
    volumes:
      - redis_data_sellermind:/data

volumes:
  mongodb_data_sellermind:
    name: mongodb_data_sellermind
  redis_data_sellermind:
    name: redis_data_sellermind
